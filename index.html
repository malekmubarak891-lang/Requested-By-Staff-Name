<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Sphere - Store Requisition</title>
    <style>
        :root {
            --primary-color: #d35400;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --border-color: #333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            padding: 20px; 
            color: #333;
        }

        .container { 
            max-width: 850px; 
            margin: auto; 
            background: #fff; 
            padding: 35px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
            box-sizing: border-box;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            border-bottom: 3px solid var(--primary-color); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header-title h1 { 
            color: var(--primary-color); 
            margin: 0; 
            font-size: 30px; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .header-title p { 
            margin: 5px 0 0; 
            font-weight: bold; 
            color: var(--secondary-color); 
            font-size: 14px;
        }
        
        .req-info { 
            text-align: right; 
            font-size: 14px; 
            line-height: 1.5;
        }

        .req-info b { color: #000; font-size: 18px; }

        .top-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        .field label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px; 
            font-size: 12px; 
            color: #555;
        }

        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(211, 84, 0, 0.2);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th { 
            background-color: #f8f9fa; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            text-align: left; 
            font-size: 12px; 
            font-weight: 700;
            text-transform: uppercase;
        }

        td { 
            padding: 8px; 
            border: 1px solid var(--border-color); 
            font-size: 14px;
        }

        .btn-add { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: bold; 
            margin-top: 15px; 
            transition: 0.2s;
        }

        .btn-add:hover { background-color: #219150; }

        .btn-remove { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 11px; 
        }

        .signature-section { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 60px; 
        }

        .sign-box { width: 30%; text-align: center; }
        .line { border-top: 1.5px solid #000; margin-bottom: 10px; }
        .sign-text { font-size: 13px; font-weight: bold; color: #333; }

        .footer-action { 
            margin-top: 40px; 
            text-align: center; 
            border-top: 1px solid #eee; 
            padding-top: 25px; 
        }

        .btn-print { 
            background-color: var(--secondary-color); 
            color: white; 
            border: none; 
            padding: 15px 50px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.3s;
        }

        /* Modal Styles */
        #customModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            text-align: center;
            border: 1px solid #ddd;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white; padding: 0; margin: 0; }
            .container { box-shadow: none !important; border: 1px solid #000 !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 15px !important; }
            .btn-add, .btn-remove, .btn-print, .footer-action, .no-print, .modal-overlay, #customModal { display: none !important; }
            input, select { border: none !important; border-bottom: 1px solid #000 !important; appearance: none !important; padding: 2px 0 !important; }
            th { border: 1px solid #000 !important; background-color: #eee !important; -webkit-print-color-adjust: exact; }
            td { border: 1px solid #000 !important; }
        }
    </style>
</head>
<body onload="initForm()">

<div class="container">
    <div class="header">
        <div class="header-title">
            <h1>SPICE SPHERE</h1>
            <p>MATERIAL REQUISITION FORM</p>
        </div>
        <div class="req-info">
            <div>Requisition No: <b id="reqNoDisplay">...</b></div>
            <div>Generated On: <span id="currentTimestamp"></span></div>
            <div style="font-size: 10px; color: #888;" class="no-print">(Continuous Numbering Active)</div>
        </div>
    </div>

    <div class="top-section">
        <div class="field">
            <label>Request Date:</label>
            <input type="date" id="reqDateInput" onchange="validateDate(this)">
        </div>
        <div class="field">
            <label>Requested By (Staff Name):</label>
            <input type="text" id="staffName" placeholder="e.g. Rahul Sharma">
        </div>
        <div class="field">
            <label>Department:</label>
            <select id="department">
                <option>Main Kitchen</option>
                <option>Bakery & Pastry</option>
                <option>Beverage (Barista/Bar)</option>
                <option>Service / Front of House</option>
                <option>Housekeeping</option>
                <option>Maintenance</option>
            </select>
        </div>
    </div>

    <table id="itemsTable">
        <thead>
            <tr>
                <th style="width: 10%;">SR #</th>
                <th style="width: 45%;">ITEM DESCRIPTION</th>
                <th style="width: 15%;">QTY</th>
                <th style="width: 20%;">UOM</th>
                <th style="width: 10%; text-align: center;" class="no-print">ACTION</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align: center;">1</td>
                <td><input type="text" placeholder="Item name..."></td>
                <td><input type="number" step="any" placeholder="0.00"></td>
                <td>
                    <select>
                        <option value="KG">Kilogram (KG)</option>
                        <option value="GM">Gram (GM)</option>
                        <option value="LTR">Litre (LTR)</option>
                        <option value="ML">Millilitre (ML)</option>
                        <option value="PCS">Pieces (PCS)</option>
                        <option value="PKT">Packet (PKT)</option>
                        <option value="BOX">Box / Case</option>
                    </select>
                </td>
                <td style="text-align: center;" class="no-print">—</td>
            </tr>
        </tbody>
    </table>

    <button class="btn-add no-print" onclick="addRow()">+ Add New Item</button>

    <div class="signature-section">
        <div class="sign-box"><div class="line"></div><div class="sign-text">Requested By</div></div>
        <div class="sign-box"><div class="line"></div><div class="sign-text">Dept Head</div></div>
        <div class="sign-box"><div class="line"></div><div class="sign-text">Store Keeper</div></div>
    </div>

    <div class="footer-action no-print">
        <button class="btn-print" onclick="handlePrintAndSave()">Confirm & Print</button>
    </div>
</div>

<div class="modal-overlay" id="overlay"></div>
<div id="customModal">
    <h3 id="modalTitle">Success</h3>
    <p id="modalMsg"></p>
    <button class="btn-add" onclick="closeModal()">OK</button>
</div>

<script>
    let currentNumber = 1;

    function initForm() {
        // Time & Date logic
        const now = new Date();
        document.getElementById('currentTimestamp').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        const todayStr = now.toISOString().slice(0, 10);
        document.getElementById('reqDateInput').value = todayStr;
        document.getElementById('reqDateInput').max = todayStr;

        // Load Last Number from memory
        let storedNum = localStorage.getItem('spice_sphere_last_num');
        if (storedNum) {
            currentNumber = parseInt(storedNum) + 1;
        } else {
            currentNumber = 1;
        }
        updateNumberDisplay();
    }

    function updateNumberDisplay() {
        const formatted = "SSB-" + currentNumber.toString().padStart(2, '0');
        document.getElementById('reqNoDisplay').innerText = formatted;
    }

    function validateDate(input) {
        const selected = new Date(input.value);
        const today = new Date();
        today.setHours(0,0,0,0);
        if (selected > today) {
            showModal("Invalid Date", "Future dates are not allowed.");
            input.value = new Date().toISOString().slice(0, 10);
        }
    }

    function addRow() {
        const table = document.getElementById("itemsTable").getElementsByTagName('tbody')[0];
        const rowCount = table.rows.length;
        const row = table.insertRow();
        row.innerHTML = `
            <td style="text-align: center;">${rowCount + 1}</td>
            <td><input type="text" placeholder="Item name..."></td>
            <td><input type="number" step="any" placeholder="0.00"></td>
            <td>
                <select>
                    <option value="KG">KG</option><option value="GM">GM</option>
                    <option value="LTR">LTR</option><option value="ML">ML</option>
                    <option value="PCS">PCS</option><option value="PKT">PKT</option>
                    <option value="BOX">BOX</option>
                </select>
            </td>
            <td style="text-align: center;" class="no-print">
                <button class="btn-remove" onclick="this.closest('tr').remove(); reorderRows();">Remove</button>
            </td>
        `;
    }

    function reorderRows() {
        const rows = document.getElementById("itemsTable").getElementsByTagName('tbody')[0].rows;
        for (let i = 0; i < rows.length; i++) { rows[i].cells[0].innerText = i + 1; }
    }

    function handlePrintAndSave() {
        window.print();
        
        // Save to memory
        localStorage.setItem('spice_sphere_last_num', currentNumber);
        
        // Modal for UI confirmation
        setTimeout(() => {
            showModal("Requisition Recorded", "Current number " + document.getElementById('reqNoDisplay').innerText + " has been used. Incrementing to next number.");
            currentNumber++;
            updateNumberDisplay();
        }, 500);
    }

    function showModal(title, msg) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('customModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
