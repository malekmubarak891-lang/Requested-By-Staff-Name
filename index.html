<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spice Sphere - Store Requisition</title>
    <style>
        :root {
            --primary-color: #d35400;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --border-color: #333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            padding: 20px; 
            color: #333;
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; 
            box-sizing: border-box;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            border-bottom: 2px solid #000; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
        }

        .header-title h1 { 
            color: var(--primary-color); 
            margin: 0; 
            font-size: 32px; 
            letter-spacing: 1px;
            font-weight: 800;
        }

        .header-title p { 
            margin: 5px 0 0; 
            font-weight: bold; 
            color: var(--secondary-color); 
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        .req-info { 
            text-align: right; 
            font-size: 14px; 
            line-height: 1.6;
        }

        .req-info b { color: #000; font-size: 16px; }

        .top-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .field label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            font-size: 13px; 
            color: #000;
        }

        input, select { 
            width: 100%; 
            padding: 8px 0; 
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 14px; 
            box-sizing: border-box;
            background: transparent;
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-color);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
        }

        th { 
            background-color: #fff; 
            padding: 12px 8px; 
            border: 1.5px solid #000; 
            text-align: left; 
            font-size: 12px; 
            font-weight: 800;
            text-transform: uppercase;
        }

        td { 
            padding: 8px; 
            border: 1px solid #000; 
            font-size: 14px;
        }

        .btn-add { 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: bold; 
            margin-top: 15px; 
        }

        .btn-remove { 
            background-color: #e74c3c; 
            color: white; 
            border: none; 
            padding: 4px 8px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 11px; 
        }

        .signature-section { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 80px; 
        }

        .sign-box { width: 30%; text-align: center; }
        .line { border-top: 1.5px solid #000; margin-bottom: 10px; }
        .sign-text { font-size: 13px; font-weight: bold; color: #000; }

        .footer-action { 
            margin-top: 40px; 
            text-align: center; 
            border-top: 1px solid #eee; 
            padding-top: 25px; 
        }

        .btn-print { 
            background-color: var(--secondary-color); 
            color: white; 
            border: none; 
            padding: 15px 50px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: all 0.3s;
        }

        #loadingOverlay {
            display: flex;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* --- PRINT OPTIMIZATIONS --- */
        @media print {
            @page { 
                size: A4; 
                margin: 10mm; /* मार्जिन को कम किया ताकि कंटेंट न कटे */
            }
            body { 
                background: white; 
                padding: 0; 
                margin: 0; 
            }
            .container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                margin: 0 !important; 
                padding: 10px !important; 
            }
            .btn-add, .btn-remove, .btn-print, .footer-action, .no-print, #loadingOverlay { 
                display: none !important; 
            }
            input, select { 
                border: none !important; 
                border-bottom: 1px solid #000 !important; /* प्रिंट में लाइन दिखनी चाहिए */
                appearance: none !important; 
                padding: 2px 0 !important;
            }
            th { 
                border: 1.5px solid #000 !important; 
                background-color: #eee !important; /* हल्का सा ग्रे शेड */
                -webkit-print-color-adjust: exact;
            }
            td { 
                border: 1px solid #000 !important; 
            }
            .signature-section {
                margin-top: 50px; /* थोड़ा कम स्पेस */
            }
        }
    </style>
</head>
<body onload="initApp()">

<!-- लोडिंग स्क्रीन: क्लाउड सिंक होने तक दिखेगी -->
<div id="loadingOverlay">
    <h2 style="color: var(--primary-color);">Spice Sphere</h2>
    <p id="loadingText">Connecting to Cloud...</p>
</div>

<div class="container">
    <div class="header">
        <div class="header-title">
            <h1>SPICE SPHERE</h1>
            <p>MATERIAL REQUISITION FORM</p>
        </div>
        <div class="req-info">
            <div>Requisition No: <b id="reqNoDisplay">...</b></div>
            <div>Generated On: <span id="currentTimestamp"></span></div>
            <div id="statusLabel" class="no-print" style="font-size: 11px; margin-top: 5px;">
                <span class="status-dot" style="background: #ccc;"></span> Checking Cloud...
            </div>
        </div>
    </div>

    <div class="top-section">
        <div class="field">
            <label>Request Date:</label>
            <input type="date" id="reqDateInput">
        </div>
        <div class="field">
            <label>Staff Name / Requested By:</label>
            <input type="text" id="staffName" placeholder="e.g. Rahul Sharma">
        </div>
        <div class="field">
            <label>Department:</label>
            <select id="department">
                <option>Main Kitchen</option>
                <option>Bakery & Pastry</option>
                <option>Beverage (Barista/Bar)</option>
                <option>Service / Front of House</option>
                <option>Housekeeping</option>
                <option>Maintenance</option>
            </select>
        </div>
    </div>

    <table id="itemsTable">
        <thead>
            <tr>
                <th style="width: 8%;">#</th>
                <th style="width: 50%;">ITEM DESCRIPTION</th>
                <th style="width: 15%;">QUANTITY</th>
                <th style="width: 20%;">UOM (UNIT)</th>
                <th style="width: 7%; text-align: center;" class="no-print">X</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align: center;">1</td>
                <td><input type="text" placeholder="Enter item name..."></td>
                <td><input type="number" step="any" placeholder="0.00"></td>
                <td>
                    <select>
                        <option value="KG">Kilogram (KG)</option>
                        <option value="GM">Gram (GM)</option>
                        <option value="LTR">Litre (LTR)</option>
                        <option value="ML">Millilitre (ML)</option>
                        <option value="PCS">Pieces (PCS)</option>
                        <option value="PKT">Packet (PKT)</option>
                        <option value="BOX">BOX (BOX)</option>
                    </select>
                </td>
                <td style="text-align: center;" class="no-print">—</td>
            </tr>
        </tbody>
    </table>

    <button class="btn-add no-print" onclick="addRow()">+ Add Item</button>

    <div class="signature-section">
        <div class="sign-box"><div class="line"></div><div class="sign-text">Requested By</div></div>
        <div class="sign-box"><div class="line"></div><div class="sign-text">Department Head</div></div>
        <div class="sign-box"><div class="line"></div><div class="sign-text">Store Keeper</div></div>
    </div>

    <div class="footer-action no-print">
        <button class="btn-print" id="printBtn" onclick="handlePrintAndSave()" disabled>Connecting...</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAaE0jKCO_ftwfjPzWu4j47CkB30CN7laM",
        authDomain: "spice-sphere.firebaseapp.com",
        projectId: "spice-sphere",
        storageBucket: "spice-sphere.firebasestorage.app",
        messagingSenderId: "40765621287",
        appId: "1:40765621287:web:b036ce7b2d9ee0e0033a02",
        measurementId: "G-0X0BHPDTEH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "spice-sphere-v1";

    let currentSequence = 1;
    let user = null;
    let syncTimeout;

    async function initApp() {
        document.getElementById('currentTimestamp').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('reqDateInput').value = new Date().toISOString().slice(0, 10);

        syncTimeout = setTimeout(() => {
            if (!user) {
                console.warn("Cloud connection slow, switching to local...");
                fallbackToLocal();
            }
        }, 5000);

        try {
            const userCredential = await signInAnonymously(auth);
            user = userCredential.user;
            setupSync();
        } catch (e) {
            console.error("Auth Error", e);
            fallbackToLocal();
        }
    }

    function setupSync() {
        const counterRef = doc(db, 'artifacts', appId, 'public', 'data', 'counters', 'req_num');
        
        onSnapshot(counterRef, (snapshot) => {
            clearTimeout(syncTimeout);
            if (snapshot.exists()) {
                currentSequence = (snapshot.data().lastNumber || 0) + 1;
            } else {
                currentSequence = 1;
                setDoc(counterRef, { lastNumber: 0 }).catch(err => console.error("Initial doc error", err));
            }
            updateUI(true);
        }, (err) => {
            console.error("Firestore Error:", err);
            fallbackToLocal();
        });
    }

    function fallbackToLocal() {
        clearTimeout(syncTimeout);
        let localNum = localStorage.getItem('spice_sphere_seq') || 0;
        currentSequence = parseInt(localNum) + 1;
        updateUI(false);
    }

    function updateUI(isCloud) {
        const formatted = "SSB-" + currentSequence.toString().padStart(2, '0');
        document.getElementById('reqNoDisplay').innerText = formatted;
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('printBtn').disabled = false;
        document.getElementById('printBtn').innerText = "Confirm & Print Requisition";
        
        const status = document.getElementById('statusLabel');
        if(isCloud) {
            status.innerHTML = '<span class="status-dot" style="background: #27ae60;"></span> Cloud Connected';
            status.style.color = "#27ae60";
        } else {
            status.innerHTML = '<span class="status-dot" style="background: #e67e22;"></span> Offline Mode';
            status.style.color = "#e67e22";
        }
    }

    window.handlePrintAndSave = async function() {
        // प्रिंट से पहले टाइमस्टैम्प अपडेट करें
        document.getElementById('currentTimestamp').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        window.print();
        
        if (user) {
            const counterRef = doc(db, 'artifacts', appId, 'public', 'data', 'counters', 'req_num');
            try {
                await setDoc(counterRef, { lastNumber: currentSequence });
            } catch (e) {
                localStorage.setItem('spice_sphere_seq', currentSequence);
            }
        } else {
            localStorage.setItem('spice_sphere_seq', currentSequence);
            currentSequence++;
            updateUI(false);
        }
    };

    window.addRow = function() {
        const table = document.getElementById("itemsTable").getElementsByTagName('tbody')[0];
        const rowCount = table.rows.length;
        const row = table.insertRow();
        row.innerHTML = `
            <td style="text-align: center;">${rowCount + 1}</td>
            <td><input type="text" placeholder="Enter item name..."></td>
            <td><input type="number" step="any" placeholder="0.00"></td>
            <td>
                <select>
                    <option value="KG">KG</option><option value="GM">GM</option>
                    <option value="LTR">LTR</option><option value="ML">ML</option>
                    <option value="PCS">PCS</option><option value="PKT">PKT</option>
                    <option value="BOX">BOX</option>
                </select>
            </td>
            <td style="text-align: center;" class="no-print">
                <button class="btn-remove" onclick="this.closest('tr').remove(); reorderRows();">X</button>
            </td>
        `;
    };

    window.reorderRows = function() {
        const rows = document.getElementById("itemsTable").getElementsByTagName('tbody')[0].rows;
        for (let i = 0; i < rows.length; i++) {
            rows[i].cells[0].innerText = i + 1;
        }
    };

    window.initApp = initApp;
</script>

</body>
</html>
